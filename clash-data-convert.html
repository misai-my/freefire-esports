<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clash Squad JSON Viewer</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#060b18;
      --panel:#081226;
      --line:rgba(124,172,255,.14);
      --ink:#eef4ff;
      --muted:#9fb0d1;
      --orange:#ff7f32;
      --cyan:#2dafff;
      --shadow:0 24px 60px rgba(0,0,0,.45);
      --radius:24px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(circle at 0% 10%, rgba(0,180,255,.12), transparent 20%),
        radial-gradient(circle at 100% 10%, rgba(255,90,0,.10), transparent 20%),
        linear-gradient(180deg,#030814 0%,#071122 100%);
      color:var(--ink);
    }

    .app{
      max-width:1880px;
      margin:0 auto;
      padding:18px;
      min-width:0;
    }

    .title{
      margin:0 0 6px;
      font-size:28px;
      font-weight:900;
      letter-spacing:.02em;
    }

    .sub{
      margin:0 0 16px;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .panel{
      background:linear-gradient(180deg, rgba(10,20,42,.94), rgba(7,14,30,.96));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      min-width:0;
    }

    .input-panel{
      padding:16px;
      margin-bottom:18px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .field label{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:var(--muted);
    }

    textarea{
      width:100%;
      min-height:220px;
      resize:vertical;
      border-radius:16px;
      border:1px solid var(--line);
      background:#08111f;
      color:var(--ink);
      padding:12px;
      outline:none;
      font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    }

    textarea:focus{
      border-color:rgba(45,175,255,.45);
      box-shadow:0 0 0 3px rgba(45,175,255,.10);
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
      align-items:center;
    }

    button{
      border:0;
      border-radius:12px;
      padding:10px 16px;
      font-weight:800;
      cursor:pointer;
      background:linear-gradient(90deg, var(--cyan), #68ffd7);
      color:#08101d;
    }

    button.ghost{
      background:transparent;
      color:var(--ink);
      border:1px solid var(--line);
    }

    .mode-btn{
      padding:8px 12px;
      font-size:12px;
      border-radius:10px;
    }

    .mode-btn.active{
      background:linear-gradient(90deg, var(--cyan), #68ffd7);
      color:#08101d;
      border-color:transparent;
    }

    .status{
      margin-top:12px;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:13px;
      white-space:pre-wrap;
    }

    .status.error{
      color:#ffd7d7;
      border-color:rgba(255,123,123,.35);
      background:rgba(255,123,123,.08);
    }

    /* ===== Match header ===== */
    .match-head{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
      gap:12px;
      align-items:center;
      padding:12px 16px;
      margin-bottom:16px;
      border-radius:20px;
      min-width:0;
    }

    .match-team-name{
      min-width:0;
      font-size:24px;
      font-weight:900;
      color:var(--orange);
      text-transform:uppercase;
      line-height:1;
      white-space:normal;
      word-break:break-word;
    }

    .match-team-name.right{
      text-align:right;
    }

    /* ✅ Score alignment fix: score always hugs the center edge (both in the middle) */
    .team-name-wrap{
      display:flex;
      align-items:center;
      justify-content:space-between; /* name to edge, score to center edge */
      gap:12px;
      width:100%;
      min-width:0;
    }

    .team-name-text{
      min-width:0;
      flex:1 1 auto;
      white-space:normal;
      word-break:break-word;
      line-height:1;
    }
    .team-name-text.right{
      text-align:right;
    }

    .team-score-pill{
      flex:0 0 auto;
      min-width:44px;
      height:30px;
      padding:0 10px;
      border-radius:999px;
      border:1px solid rgba(124,172,255,.18);
      background:rgba(255,255,255,.05);
      color:#fff;
      font-size:16px;
      font-weight:900;
      line-height:1;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.03);
    }

    .match-round{
      padding:8px 14px;
      border-radius:14px;
      border:1px solid rgba(124,172,255,.18);
      background:rgba(3,12,28,.72);
      font-size:16px;
      font-weight:900;
      letter-spacing:.06em;
      text-transform:uppercase;
      color:#fff;
      white-space:nowrap;
      line-height:1;
    }

    .arena-wrap{
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(0,1fr);
      gap:16px;
      align-items:start;
      min-width:0;
      position:relative;
      overflow:visible;
    }

    .team-panel{
      position:relative;
      min-width:0;
      overflow:visible;
      border-radius:24px;
      padding:14px;
      border:1px solid rgba(124,172,255,.12);
      background:
        linear-gradient(180deg, rgba(7,18,38,.95), rgba(5,14,30,.96)),
        linear-gradient(90deg, rgba(45,175,255,.04), rgba(255,127,50,.03));
      box-shadow:var(--shadow);
      z-index:1;
    }

    .team-panel:hover,
    .team-panel:focus-within{
      z-index:6;
    }

    .team-panel::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:24px;
      pointer-events:none;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.025);
    }

    .team-glow{
      position:absolute;
      width:220px;
      height:220px;
      filter:blur(70px);
      opacity:.22;
      pointer-events:none;
    }

    .team-glow-left{
      top:-40px;
      left:-60px;
      background:#12b7ff;
    }

    .team-glow-right{
      top:-40px;
      right:-60px;
      background:#ff5a2d;
    }

    .team-inner{
      position:relative;
      z-index:1;
      display:grid;
      gap:12px;
      min-width:0;
      overflow:visible;
    }

    .player-grid,
    .detail-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:10px;
      align-items:start;
      align-content:start;
      min-width:0;
      overflow:visible;
    }

    .player-card{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:10px;
      border-radius:16px;
      border:1px solid rgba(124,172,255,.10);
      background:rgba(255,255,255,.02);
      overflow:visible;
      position:relative;
      z-index:1;
    }

    .hero-card{
      position:relative;
      border-radius:18px;
      padding:4px;
      background:linear-gradient(180deg, rgba(55,133,255,.25), rgba(255,127,50,.10));
      border:1px solid rgba(124,172,255,.14);
      overflow:visible;
    }

    .hero-card-inner{
      position:relative;
      height:120px;
      border-radius:15px;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 10%, rgba(255,255,255,.08), transparent 35%),
        linear-gradient(180deg, rgba(7,14,27,.75), rgba(2,8,18,.92));
      display:flex;
      align-items:flex-end;
      justify-content:center;
    }

    .hero-card-inner img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      padding:10px;
    }

    .hero-fallback{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:11px;
      text-align:center;
      padding:8px;
      line-height:1.2;
    }

    .char-name{
      text-align:center;
      font-size:13px;
      font-weight:800;
      color:#dfe9ff;
      line-height:1.2;
      white-space:normal;
      word-break:break-word;
      min-height:30px;
    }

    .player-tag{
      border:1px solid rgba(124,172,255,.14);
      background:rgba(255,255,255,.03);
      border-radius:999px;
      min-height:34px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:6px 8px;
      text-align:center;
      font-size:12px;
      font-weight:800;
      color:#f2f6ff;
      line-height:1.2;
      white-space:normal;
      word-break:break-word;
    }

    .skill-chip-row{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:6px;
      min-height:40px;
      overflow:visible;
      position:relative;
      z-index:1;
    }

    .skill-chip{
      position:relative;
      width:64px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
      min-width:0;
      overflow:visible;
    }

    .skill-chip-icon{
      width:42px;
      height:42px;
      border-radius:10px;
      border:1px solid rgba(124,172,255,.18);
      background:rgba(255,255,255,.04);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
    }

    .skill-chip-icon img{
      width:100%;
      height:100%;
      object-fit:contain;
      padding:4px;
    }

    .skill-chip-label{
      width:100%;
      font-size:10px;
      line-height:1.15;
      text-align:center;
      font-weight:800;
      color:#dfe9ff;
      white-space:normal;
      word-break:break-word;
    }

    .icon-fallback{
      font-size:10px;
      color:var(--muted);
      padding:4px;
      text-align:center;
      line-height:1.2;
    }

    /* ✅ Popups above everything */
    .hover-wrap{
      position:relative;
      outline:none;
      z-index:1;
      overflow:visible;
    }

    .hover-wrap:hover,
    .hover-wrap:focus-within{
      z-index:9999;
    }

    .hover-popup{
      position:absolute;
      left:50%;
      bottom:calc(100% + 10px);
      transform:translateX(-50%) translateY(6px);
      width:min(320px, calc(100vw - 32px));
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(124,172,255,.18);
      background:rgba(5,12,24,.98);
      box-shadow:0 18px 36px rgba(0,0,0,.45);
      opacity:0;
      pointer-events:none;
      transition:opacity .16s ease, transform .16s ease;
      z-index:10000;
      text-align:left;
    }

    .hover-popup::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:-7px;
      width:12px;
      height:12px;
      transform:translateX(-50%) rotate(45deg);
      background:rgba(5,12,24,.98);
      border-right:1px solid rgba(124,172,255,.18);
      border-bottom:1px solid rgba(124,172,255,.18);
    }

    .hover-wrap:hover .hover-popup,
    .hover-wrap:focus-within .hover-popup{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .hover-title{
      font-size:12px;
      font-weight:900;
      color:#fff;
      margin-bottom:4px;
      line-height:1.3;
    }

    .hover-meta{
      font-size:11px;
      color:#7fe0ff;
      font-weight:800;
      margin-bottom:6px;
      line-height:1.3;
    }

    .hover-body{
      font-size:11px;
      color:#d3dffc;
      line-height:1.45;
      white-space:normal;
    }

    .section-box{
      border-radius:16px;
      border:1px solid rgba(124,172,255,.10);
      background:rgba(255,255,255,.025);
      padding:8px;
      display:grid;
      gap:8px;
      min-width:0;
      overflow:visible;
    }

    .section-title{
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted);
      font-weight:900;
      line-height:1.25;
      white-space:normal;
      word-break:break-word;
    }

    .single-card{
      min-height:46px;
      border-radius:12px;
      border:1px solid rgba(124,172,255,.10);
      background:rgba(255,255,255,.03);
      display:flex;
      align-items:flex-start;
      gap:6px;
      padding:6px;
      min-width:0;
    }

    .single-card.primary{
      border-color:rgba(255,173,58,.55);
      box-shadow:inset 0 0 0 1px rgba(255,173,58,.18);
    }

    .card-thumb{
      width:30px;
      height:30px;
      border-radius:8px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(124,172,255,.14);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      flex:0 0 auto;
    }

    .card-thumb img{
      width:100%;
      height:100%;
      object-fit:contain;
      padding:3px;
    }

    .card-copy{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:3px;
      width:100%;
    }

    .card-title{
      font-size:11px;
      font-weight:800;
      color:#eef4ff;
      line-height:1.15;
      white-space:normal;
      word-break:break-word;
    }

    .details-panel{
      margin-top:16px;
      padding:14px;
    }

    .details-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .details-panel-title{
      font-size:14px;
      font-weight:900;
      letter-spacing:.06em;
      text-transform:uppercase;
      color:#eef4ff;
      margin:0;
    }

    .details-wrap{
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(0,1fr);
      gap:16px;
      min-width:0;
      align-items:start;
      align-content:start;
    }

    .details-team-block{
      border-radius:18px;
      border:1px solid rgba(124,172,255,.10);
      background:rgba(255,255,255,.02);
      padding:10px;
      min-width:0;
      display:grid;
      gap:10px;
      align-content:start;
      align-items:start;
      align-self:start;
    }

    .details-team-title{
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#eef4ff;
      white-space:normal;
      word-break:break-word;
    }

    .detail-col{
      min-width:0;
      display:grid;
      gap:8px;
      align-content:start;
      align-items:start;
      align-self:start;
    }

    .detail-col-head{
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(124,172,255,.10);
      background:rgba(255,255,255,.03);
      font-size:11px;
      font-weight:900;
      color:#eef4ff;
      line-height:1.25;
      text-align:center;
      white-space:normal;
      word-break:break-word;
    }

    .row-fold{
      border-radius:12px;
      border:1px solid rgba(124,172,255,.08);
      background:rgba(255,255,255,.02);
      overflow:hidden;
      min-width:0;
      margin-top:10px;
    }

    .row-fold:first-child{
      margin-top:0;
    }

    .row-fold summary{
      list-style:none;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:10px 12px;
      background:rgba(255,255,255,.02);
      color:#cfe0ff;
      font-size:10px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
      line-height:1.2;
    }

    .row-fold summary::-webkit-details-marker{ display:none; }

    .row-fold summary::after{
      content:"▸";
      font-size:12px;
      color:#cfe0ff;
      flex:0 0 auto;
      transition:transform .18s ease;
    }

    .row-fold[open] summary::after{ transform:rotate(90deg); }

    .row-fold-body{
      padding:10px;
      border-top:1px solid rgba(124,172,255,.08);
    }

    .round-fold{
      border-radius:12px;
      border:1px solid rgba(124,172,255,.08);
      background:rgba(255,255,255,.02);
      overflow:hidden;
      min-width:0;
      align-self:start;
    }

    .round-fold summary{
      list-style:none;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:8px 10px;
      background:rgba(255,255,255,.03);
      color:#cfe0ff;
      font-size:10px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
      line-height:1.2;
    }

    .round-fold summary::-webkit-details-marker{ display:none; }

    .round-fold summary::after{
      content:"▸";
      font-size:12px;
      color:#cfe0ff;
      flex:0 0 auto;
      transition:transform .18s ease;
    }

    .round-fold[open] summary::after{ transform:rotate(90deg); }

    .round-fold-body{
      padding:10px;
      border-top:1px solid rgba(124,172,255,.08);
    }

    .stats-sections{
      display:grid;
      gap:8px;
      min-width:0;
      align-items:start;
      align-content:start;
    }

    .stats-category{
      border-radius:12px;
      border:1px solid rgba(124,172,255,.08);
      background:rgba(255,255,255,.02);
      overflow:hidden;
      min-width:0;
      align-self:start;
    }

    .stats-category-title{
      padding:6px 8px;
      font-size:10px;
      font-weight:900;
      color:#cfe0ff;
      text-transform:uppercase;
      letter-spacing:.08em;
      background:rgba(255,255,255,.03);
      border-bottom:1px solid rgba(124,172,255,.08);
      white-space:normal;
      line-height:1.2;
      word-break:break-word;
    }

    .stats-table{
      display:grid;
      min-width:0;
      align-content:start;
    }

    .stats-row{
      display:grid;
      grid-template-columns:minmax(72px,.9fr) minmax(0,1.1fr);
      gap:6px;
      padding:6px 8px;
      border-top:1px solid rgba(124,172,255,.06);
      align-items:start;
      min-width:0;
    }

    .stats-row:first-child{ border-top:0; }

    .stats-key{
      font-size:10px;
      font-weight:800;
      color:var(--muted);
      white-space:normal;
      line-height:1.2;
      word-break:break-word;
      align-self:start;
    }

    .stats-val{
      font-size:10px;
      font-weight:700;
      color:#eef4ff;
      white-space:normal;
      line-height:1.25;
      word-break:break-word;
      min-width:0;
      align-self:start;
    }

    .empty-lite{
      color:var(--muted);
      font-size:11px;
      line-height:1.3;
      white-space:normal;
      word-break:break-word;
    }

    .prompt-panel{
      margin-top:16px;
      padding:14px;
    }

    .prompt-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .prompt-title{
      font-size:14px;
      font-weight:900;
      letter-spacing:.06em;
      text-transform:uppercase;
      color:#eef4ff;
    }

    #aiPromptOutput{
      min-height:340px;
      background:#07101f;
    }

    .copy-note{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
    }

    @media (max-width: 1500px){
      .player-grid, .detail-grid{ grid-template-columns:repeat(2, minmax(0,1fr)); }
      .hero-card-inner{ height:130px; }
    }

    @media (max-width: 980px){
      .match-head{
        grid-template-columns:1fr;
        justify-items:center;
        text-align:center;
      }

      .match-team-name,
      .match-team-name.right{
        text-align:center;
      }

      /* Center on mobile */
      .team-name-wrap{
        justify-content:center;
        gap:10px;
      }
      .team-name-text, .team-name-text.right{ text-align:center; }

      .arena-wrap, .details-wrap{ grid-template-columns:1fr; }
      .player-grid, .detail-grid{ grid-template-columns:repeat(2, minmax(0,1fr)); }
    }

    @media (max-width: 640px){
      .player-grid, .detail-grid{ grid-template-columns:1fr; }
      .hero-card-inner{ height:150px; }
      .stats-row{ grid-template-columns:1fr; gap:4px; }
      .details-head{ align-items:flex-start; }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1 class="title">Clash Squad JSON → Team Viewer</h1>
    <p class="sub">Paste your match JSON, then render.</p>

    <div class="panel input-panel">
      <div class="field">
        <label for="jsonInput">Paste Match JSON</label>
        <textarea id="jsonInput" placeholder='Paste the full JSON here...'></textarea>
      </div>

      <div class="actions">
        <button id="renderBtn">Render</button>
        <button id="reloadLookupBtn" class="ghost" type="button">Reload Lookup + Images</button>
        <button id="clearBtn" class="ghost" type="button">Clear</button>
      </div>

    <div class="panel prompt-panel">
      <div class="prompt-head">

      <textarea id="aiPromptOutput" readonly placeholder="Render match JSON first to generate a copy-ready prompt for AI analysis..."></textarea>
      <div id="copyPromptStatus" class="copy-note">The generated prompt is built for an esports commentator / analyst / coach perspective.</div>
    </div>
  </div>

  <script>
    const client = supabase.createClient(
      'https://ooutjrewmwsixghbouxi.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vdXRqcmV3bXdzaXhnaGJvdXhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwMjg3NTMsImV4cCI6MjA4MjYwNDc1M30.13WkdGiQH39lZH3iDgVDd_tZrHlI0twhGeiZNdwaMSg'
    );

    const CHARACTER_JSON_URL = 'https://misai-my.github.io/freefire-esports/character.json';
    const PET_JSON_URL = 'https://misai-my.github.io/freefire-esports/pet.json';
    const LOADOUT_JSON_URL = 'https://misai-my.github.io/freefire-esports/loadout.json';
    const SHARED_ROOM = 'global';
    const LOCAL_INPUT_KEY = 'cs_clash_local_json';

    const $ = (id) => document.getElementById(id);

    let matchApiLoaded = false;
    let assetsLoaded = false;
    let detailsMode = "latest";
    let CURRENT_TEAMS = null;
    let CURRENT_PAYLOAD = null;
    let CURRENT_SHARED_JSON_TEXT = "";
    let sharedChannel = null;
    let applyingRemoteState = false;

    const LOOKUPS = {
      storeItems: new Map(),
      items: new Map(),
      skills: new Map(),
      pets: new Map()
    };

    const ASSETS = {
      charactersById: new Map(),
      charactersByName: new Map(),
      petsByName: new Map(),
      loadoutsById: new Map()
    };

    const LOADOUT_FALLBACKS = [
      { loadout_id: 500000003, name: 'Super Leg Pocket', image_url: 'https://i.imgur.com/hVW6fWi.png', cs_description: 'Start each match with key items and extra protection.' },
      { loadout_id: 500000004, name: 'Tactical Market', image_url: 'https://i.imgur.com/OBnERWB.png', cs_description: 'Get a tactical panel each round and deploy a chosen gadget.' },
      { loadout_id: 500000005, name: 'Team Booster', image_url: 'https://i.imgur.com/RAG1acC.png', cs_description: 'Helper Bot revives teammates remotely and Secret Bazaar team buffs are available in the CS Store.' },
      { loadout_id: 500000008, name: 'Enhance Hammer', image_url: 'https://i.imgur.com/gClc4RN.png', cs_description: 'Earn tokens via eliminations and enhance weapons / gloo walls during purchase phase.' }
    ];

    function setStatus(message, isError = false) {
      const el = $("status");
      el.textContent = message;
      el.className = isError ? "status error" : "status";
    }

    function setCopyPromptStatus(message) {
      $("copyPromptStatus").textContent = message;
    }

    function getLocalInput() {
      try { return localStorage.getItem(LOCAL_INPUT_KEY) || ""; }
      catch { return ""; }
    }

    function setLocalInput(value) {
      try { localStorage.setItem(LOCAL_INPUT_KEY, String(value || "")); }
      catch {}
    }

    function clearLocalInput() {
      try { localStorage.removeItem(LOCAL_INPUT_KEY); }
      catch {}
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeHtmlWithBreaks(value) {
      return escapeHtml(value ?? "").replace(/\n/g, "<br>");
    }

    function normalizeKey(value) {
      return String(value ?? "").trim().toUpperCase().replace(/[^A-Z0-9]+/g, "");
    }

    function toNum(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function humanizeKey(key) {
      return String(key || "")
        .replace(/_/g, " ")
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function formatGenericValue(value) {
      if (value === null || value === undefined) return "—";
      if (typeof value === "boolean") return value ? "Yes" : "No";
      if (Array.isArray(value)) {
        if (!value.length) return "0";
        const allPrimitive = value.every(v => v === null || ["string","number","boolean"].includes(typeof v));
        return allPrimitive ? value.map(formatGenericValue).join(", ") : `${value.length} entries`;
      }
      if (typeof value === "object") {
        try { return JSON.stringify(value); } catch { return "[object]"; }
      }
      return String(value);
    }

    function scoreLookupName(name) {
      const s = String(name || "").trim();
      if (!s) return -999;

      let score = 0;
      if (!/500000\d+/.test(s)) score += 100;

      const wordCount = s.split(/\s+/).filter(Boolean).length;
      if (wordCount <= 4) score += 40;
      else if (wordCount <= 7) score += 15;
      else score -= 20;

      if (/[.!?]/.test(s)) score -= 25;
      if (/(will|obtain|marked on the map|once you open|head there)/i.test(s)) score -= 40;

      score -= Math.min(s.length, 120) * 0.15;
      return score;
    }

    function setBestLookupEntry(map, id, name) {
      const cleanName = String(name || "").trim();
      if (!cleanName) return;

      const current = map.get(id);
      if (!current) { map.set(id, cleanName); return; }
      if (scoreLookupName(cleanName) > scoreLookupName(current)) map.set(id, cleanName);
    }

    function sanitizeResolvedItemName(name) {
      let s = String(name || "").replace(/\s+/g, " ").trim();
      if (!s) return null;
      s = s.replace(/\s*500000\d+[\s\S]*$/i, "").trim();
      const words = s.split(/\s+/).filter(Boolean);
      if (words.length > 5) s = words.slice(0, 3).join(" ");
      return s || null;
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`Failed to fetch ${url} (${res.status})`);
      return res.json();
    }

    function resolveItemName(id, preferStore = false) {
      const numId = Number(id);
      if (!Number.isFinite(numId)) return null;

      const firstRaw = preferStore ? (LOOKUPS.storeItems.get(numId) || null) : (LOOKUPS.items.get(numId) || null);
      const secondRaw = preferStore ? (LOOKUPS.items.get(numId) || null) : (LOOKUPS.storeItems.get(numId) || null);

      const firstClean = sanitizeResolvedItemName(firstRaw);
      const secondClean = sanitizeResolvedItemName(secondRaw);
      return firstClean || secondClean || null;
    }

    function getLookupName(type, id) {
      const numId = Number(id);
      if (!Number.isFinite(numId)) return null;
      if (type === 0) return LOOKUPS.storeItems.get(numId) || null;
      if (type === 1) return LOOKUPS.items.get(numId) || null;
      if (type === 2) return LOOKUPS.skills.get(numId) || null;
      if (type === 3) return LOOKUPS.pets.get(numId) || null;
      return null;
    }

    async function loadMatchApiLookups() {
      const { data, error } = await client
        .from("match_api")
        .select("id, type, name")
        .in("type", [0, 1, 2, 3]);

      if (error) throw error;

      LOOKUPS.storeItems.clear();
      LOOKUPS.items.clear();
      LOOKUPS.skills.clear();
      LOOKUPS.pets.clear();

      for (const row of (data || [])) {
        const id = Number(row.id);
        const type = Number(row.type);
        const name = String(row.name || "").trim();
        if (!Number.isFinite(id) || !name) continue;

        if (type === 0) setBestLookupEntry(LOOKUPS.storeItems, id, name);
        if (type === 1) setBestLookupEntry(LOOKUPS.items, id, name);
        if (type === 2) setBestLookupEntry(LOOKUPS.skills, id, name);
        if (type === 3) setBestLookupEntry(LOOKUPS.pets, id, name);
      }

      matchApiLoaded = true;
      return {
        storeItems: LOOKUPS.storeItems.size,
        items: LOOKUPS.items.size,
        skills: LOOKUPS.skills.size,
        pets: LOOKUPS.pets.size
      };
    }

    function seedFallbackLoadouts() {
      ASSETS.loadoutsById.clear();
      for (const row of LOADOUT_FALLBACKS) {
        ASSETS.loadoutsById.set(Number(row.loadout_id), {
          loadout_id: Number(row.loadout_id),
          name: row.name,
          image_url: row.image_url,
          cs_description: row.cs_description
        });
      }
    }

    function extractLoadoutRows(raw) {
      const rows = Array.isArray(raw) ? raw : [];
      for (const row of rows) {
        const loadoutId = Number(row?.loadout_id);
        if (!Number.isFinite(loadoutId)) continue;

        ASSETS.loadoutsById.set(loadoutId, {
          loadout_id: loadoutId,
          name: String(row?.name || "").trim(),
          image_url: String(row?.image_url || "").trim(),
          cs_description: String(row?.description?.cs || "").trim()
        });
      }
    }

    async function loadAssetCatalogs() {
      const [characters, pets, loadouts] = await Promise.allSettled([
        fetchJson(CHARACTER_JSON_URL),
        fetchJson(PET_JSON_URL),
        fetchJson(LOADOUT_JSON_URL)
      ]);

      ASSETS.charactersById.clear();
      ASSETS.charactersByName.clear();
      ASSETS.petsByName.clear();
      seedFallbackLoadouts();

      if (characters.status === "fulfilled") {
        for (const row of (characters.value || [])) {
          const imageUrl = row?.image_url || "";
          const apiId = Number(row?.api_id);
          const asset = { name: row?.name || "", image_url: imageUrl, skill: row?.skill || "", description: row?.description || "" };

          if (imageUrl && Number.isFinite(apiId)) ASSETS.charactersById.set(apiId, asset);
          if (row?.name) ASSETS.charactersByName.set(normalizeKey(row.name), asset);
          if (row?.skill) ASSETS.charactersByName.set(normalizeKey(row.skill), asset);
        }
      }

      if (pets.status === "fulfilled") {
        for (const row of (pets.value || [])) {
          if (!row?.name) continue;
          ASSETS.petsByName.set(normalizeKey(row.name), {
            name: row.name,
            image_url: row?.image_url || "",
            skill: row?.skill || "",
            description: row?.description || ""
          });
        }
      }

      if (loadouts.status === "fulfilled") extractLoadoutRows(loadouts.value);

      assetsLoaded = true;
      return {
        characters: ASSETS.charactersById.size,
        pets: ASSETS.petsByName.size,
        loadouts: ASSETS.loadoutsById.size
      };
    }

    async function warmUp() {
      setStatus("Loading lookup and image catalogs...");
      const [lookupResult, assetResult] = await Promise.allSettled([loadMatchApiLookups(), loadAssetCatalogs()]);
      const errors = [];

      if (lookupResult.status === "rejected") { matchApiLoaded = false; errors.push(`match_api: ${lookupResult.reason?.message || lookupResult.reason}`); }
      if (assetResult.status === "rejected") { assetsLoaded = false; errors.push(`asset catalogs: ${assetResult.reason?.message || assetResult.reason}`); }

      if (errors.length) { setStatus(`Some data failed to load:\n${errors.join("\n")}`, true); return; }

      setStatus(
        `Ready.\n` +
        `match_api → Type0 ${lookupResult.value.storeItems}, Type1 ${lookupResult.value.items}, Skills ${lookupResult.value.skills}, Pets ${lookupResult.value.pets}\n` +
        `Assets → Characters ${assetResult.value.characters}, Pets ${assetResult.value.pets}, Loadouts ${assetResult.value.loadouts}`
      );
    }

    function getCharacterAsset(skillId, fallbackName = "") {
      const byId = ASSETS.charactersById.get(Number(skillId));
      if (byId) return byId;
      if (fallbackName) return ASSETS.charactersByName.get(normalizeKey(fallbackName)) || null;
      return null;
    }

    function getPetAsset(name = "") {
      if (!name) return null;
      return ASSETS.petsByName.get(normalizeKey(name)) || null;
    }

    function getLoadoutAsset(loadoutId) {
      const id = Number(loadoutId);
      if (!Number.isFinite(id)) return null;
      return ASSETS.loadoutsById.get(id) || null;
    }

    function getActiveSkillInfo(player) {
      const info = Array.isArray(player?.skill_info) ? player.skill_info : [];
      return info.find(s => s && s.skill_active === true) || info[0] || null;
    }

    function getActiveSkillId(player) {
      const activeInfo = getActiveSkillInfo(player);
      return activeInfo?.skill_id ?? (Array.isArray(player?.skill_ids) ? player.skill_ids[0] : null);
    }

    function getActiveSkillEntry(player) {
      const activeInfo = getActiveSkillInfo(player);
      const activeId = getActiveSkillId(player);

      if (!activeId) return { id:null, label:"—", skill:"", description:"", image_url:"", slotType:"Active" };

      const lookupName = getLookupName(2, activeId) || activeInfo?.skill_name || `Skill ID ${activeId}`;
      const asset = getCharacterAsset(activeId, lookupName);

      return {
        id: Number(activeId),
        label: asset?.name || lookupName,
        skill: asset?.skill || activeInfo?.skill_name || lookupName,
        description: asset?.description || "",
        image_url: asset?.image_url || "",
        slotType: "Active"
      };
    }

    function getPassiveSkillEntries(player) {
      const ids = Array.isArray(player?.skill_ids) ? player.skill_ids : [];
      const activeId = getActiveSkillId(player);
      const uniquePassiveIds = [...new Set(ids.filter(id => Number(id) !== Number(activeId)))];

      return uniquePassiveIds.map(id => {
        const lookupName = getLookupName(2, id) || `Skill ID ${id}`;
        const asset = getCharacterAsset(id, lookupName);
        return {
          id: Number(id),
          label: asset?.name || lookupName,
          skill: asset?.skill || lookupName,
          description: asset?.description || "",
          image_url: asset?.image_url || "",
          slotType: "Passive"
        };
      });
    }

    function getPetEntry(player) {
      const petId = player?.pet_skill_id;
      if (!petId) return { id:null, label:"—", skill:"", description:"", image_url:"", slotType:"Pet" };

      const lookupName = getLookupName(3, petId) || `Pet ID ${petId}`;
      const asset = getPetAsset(lookupName);

      return {
        id: Number(petId),
        label: asset?.name || lookupName,
        skill: asset?.skill || lookupName,
        description: asset?.description || "",
        image_url: asset?.image_url || "",
        slotType: "Pet"
      };
    }

    function getPlayerLoadoutId(player) {
      const arr = Array.isArray(player?.loadouts) ? player.loadouts : [];
      if (!arr.length) return null;
      const id = Number(arr[0]);
      return Number.isFinite(id) ? id : null;
    }

    function getPlayerLoadoutEntry(player) {
      const id = getPlayerLoadoutId(player);
      if (!Number.isFinite(id)) return { loadout_id:null, name:"No loadout found", image_url:"", cs_description:"" };

      const asset = getLoadoutAsset(id);
      return {
        loadout_id: id,
        name: asset?.name || `Loadout ${id}`,
        image_url: asset?.image_url || "",
        cs_description: asset?.cs_description || ""
      };
    }

    function getLatestRoundStat(player) {
      const rounds = Array.isArray(player?.round_stats) ? [...player.round_stats] : [];
      if (!rounds.length) return null;
      rounds.sort((a, b) => toNum(b?.round_index, -1) - toNum(a?.round_index, -1));
      return rounds[0];
    }

    function getLatestRoundIndex(player) {
      const round = getLatestRoundStat(player);
      const idx = Number(round?.round_index);
      return Number.isFinite(idx) ? idx : null;
    }

    function getRoundStatByIndex(player, targetRoundIndex) {
      const rounds = Array.isArray(player?.round_stats) ? player.round_stats : [];
      return rounds.find(r => toNum(r?.round_index, -999) === targetRoundIndex) || null;
    }

    function getAllRoundIndicesForTeams(teams) {
      const set = new Set();
      for (const team of teams || []) {
        const players = Array.isArray(team?.player_stats) ? team.player_stats : [];
        for (const player of players) {
          const rounds = Array.isArray(player?.round_stats) ? player.round_stats : [];
          for (const round of rounds) {
            const idx = toNum(round?.round_index, -1);
            if (idx >= 0) set.add(idx);
          }
        }
      }
      return [...set].sort((a, b) => a - b);
    }

    function getItemsForRound(player, roundIndex) {
      const round = getRoundStatByIndex(player, roundIndex);
      const items = Array.isArray(round?.item_nums) ? round.item_nums : [];

      return items
        .filter(item => toNum(item?.item_num) > 0)
        .map(item => {
          const id = Number(item?.item_id);
          const name = resolveItemName(id, false) || item?.item_name || `Item ID ${id}`;
          return { id, name, count: toNum(item?.item_num) };
        })
        .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
    }

    function getPurchasedItemsForRound(player, targetRoundIndex) {
      const round = getRoundStatByIndex(player, targetRoundIndex);
      if (!round) return [];

      const purchased = Array.isArray(round?.purchased_items) ? round.purchased_items : [];
      const counts = new Map();

      for (const rawId of purchased) {
        const id = Number(rawId);
        if (!Number.isFinite(id)) continue;
        if (id >= 500000000) continue;

        const resolvedName = resolveItemName(id, true);
        if (!resolvedName) continue;

        counts.set(id, (counts.get(id) || 0) + 1);
      }

      return [...counts.entries()]
        .map(([id, count]) => ({ id, name: resolveItemName(id, true), count }))
        .filter(item => item.name)
        .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
    }

    function getWeaponUsagesForRound(player, roundIndex) {
      const round = getRoundStatByIndex(player, roundIndex);
      const usages = Array.isArray(round?.weapon_usages) ? round.weapon_usages : [];

      return usages.map(weapon => ({
        raw: weapon || {},
        id: Number(weapon?.weapon_id),
        name: weapon?.weapon_name || `Weapon ID ${weapon?.weapon_id ?? "?"}`
      }));
    }

    function getDisplayRound(payload, teams = []) {
      let best = -1;

      const matchRounds = payload?.match?.match_stats_extra?.round_stats;
      if (Array.isArray(matchRounds)) for (const r of matchRounds) best = Math.max(best, toNum(r?.round_index, -1));

      for (const team of teams) {
        const players = Array.isArray(team?.player_stats) ? team.player_stats : [];
        for (const player of players) {
          const rounds = Array.isArray(player?.round_stats) ? player.round_stats : [];
          for (const r of rounds) best = Math.max(best, toNum(r?.round_index, -1));
        }
      }

      return best >= 0 ? `Round ${best + 1}` : "Round —";
    }

    function computeTeamScore(team) {
      const players = Array.isArray(team?.player_stats) ? team.player_stats : [];
      const wonRounds = new Set();

      for (const player of players) {
        const rounds = Array.isArray(player?.round_stats) ? player.round_stats : [];
        for (const round of rounds) {
          const roundIndex = toNum(round?.round_index, -1);
          if (roundIndex < 0) continue;
          if (round?.is_win === true) wonRounds.add(roundIndex);
        }
      }

      return wonRounds.size;
    }

    /* ✅ Score in the middle edge for both sides (symmetric) */
    function renderTeamHeader(name, score, side = "left") {
      const safeName = escapeHtml(name || "—");
      const scoreHtml = Number.isFinite(score) ? `<span class="team-score-pill">${score}</span>` : "";
      if (side === "right") {
        return `
          <div class="team-name-wrap">
            ${scoreHtml}
            <span class="team-name-text right">${safeName}</span>
          </div>
        `;
      }
      return `
        <div class="team-name-wrap">
          <span class="team-name-text">${safeName}</span>
          ${scoreHtml}
        </div>
      `;
    }

    function setTeamHeader(elId, name, score, side) {
      const el = $(elId);
      el.innerHTML = renderTeamHeader(name, score, side);
    }

    function renderHeroImage(imageUrl, alt) {
      if (!imageUrl) return `<div class="hero-fallback">No Image</div>`;
      return `<img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(alt)}" loading="lazy">`;
    }

    function renderPopup(title, meta, body) {
      if (!body) return "";
      return `
        <div class="hover-popup">
          <div class="hover-title">${escapeHtml(title || "Info")}</div>
          <div class="hover-meta">${escapeHtml(meta || "")}</div>
          <div class="hover-body">${escapeHtmlWithBreaks(body)}</div>
        </div>
      `;
    }

    function renderTooltip(entry) {
      if (!entry || (!entry.skill && !entry.description)) return "";
      const meta = entry.slotType ? `${entry.slotType}${entry.label ? " • " + entry.label : ""}` : (entry.label || "");
      return renderPopup(entry.skill || entry.label || "Skill", meta, entry.description || "No description available.");
    }

    function renderSkillChip(entry) {
      if (!entry) return "";
      return `
        <div class="skill-chip hover-wrap" tabindex="0">
          <div class="skill-chip-icon">
            ${entry.image_url
              ? `<img src="${escapeHtml(entry.image_url)}" alt="${escapeHtml(entry.label)}" loading="lazy">`
              : `<span class="icon-fallback">N/A</span>`
            }
          </div>
          <div class="skill-chip-label">${escapeHtml(entry.label || "—")}</div>
          ${renderTooltip(entry)}
        </div>
      `;
    }

    function renderLoadoutCard(loadout) {
      const title = loadout?.name || "No loadout found";
      const desc = loadout?.cs_description || "";
      return `
        <div class="hover-wrap" tabindex="0">
          <div class="single-card primary">
            <div class="card-thumb">
              ${loadout?.image_url
                ? `<img src="${escapeHtml(loadout.image_url)}" alt="${escapeHtml(title)}" loading="lazy">`
                : `<span class="icon-fallback">N/A</span>`
              }
            </div>
            <div class="card-copy">
              <div class="card-title">${escapeHtml(title)}</div>
            </div>
          </div>
          ${desc ? renderPopup(title, "Loadout", desc) : ""}
        </div>
      `;
    }

    /* ============================================================
       ✅ Round Stats Broken Down By Section (NEW RULES)
       - Remove Round Outcome & Flags
       - Add First Blood:
           is_first_down === true => Tag "First Blood"
           is_first_taken_down === true => Tag "First Down"
       - Combat Output ONLY:
           Kills, Assists, Headshots, Damage(real_damage), Damage Taken(real_damage_taken), Knock Down
       - Economy & Purchases (as is)
       - Abilities & Utility (as is)
       - Remove Other Round Fields / everything else
    ============================================================ */
    function buildRoundStatsSections(round) {
      const out = {
        "First Blood": [],
        "Combat Output": [],
        "Economy & Purchases": [],
        "Abilities & Utility": []
      };

      const tag = [];
      if (round?.is_first_down === true) tag.push("First Blood");
      if (round?.is_first_taken_down === true) tag.push("First Down");
      out["First Blood"].push(["Tag", tag.length ? tag.join(" • ") : "None"]);

      const combat = [
        ["Kills", round?.kill],
        ["Assists", round?.assists],
        ["Headshots", round?.headshots],
        ["Damage", round?.real_damage],
        ["Damage Taken", round?.real_damage_taken],
        ["Knock Down", round?.knock_down],
      ];
      for (const [label, val] of combat) out["Combat Output"].push([label, val]);

      const econKeys = ["economy_spent_self","economy_spent_on_teammates","initial_item_value","airdrop_points"];
      for (const k of econKeys) {
        if (k in (round || {})) out["Economy & Purchases"].push([humanizeKey(k), round[k]]);
      }

      const utilKeys = ["nb_skill_usages","medkit_use","grenade_use","icewall_use","throwable_use"];
      for (const k of utilKeys) {
        if (k in (round || {})) out["Abilities & Utility"].push([humanizeKey(k), round[k]]);
      }

      return out;
    }

      const roundIndices = [];
      const rounds = Array.isArray(player?.round_stats) ? player.round_stats : [];
      for (const round of rounds) {
        const idx = toNum(round?.round_index, -1);
        if (idx >= 0) roundIndices.push(idx);
      }
      const uniqueSorted = [...new Set(roundIndices)].sort((a, b) => a - b);
      return uniqueSorted.map(roundIndex => ({ roundIndex, items: getPurchasedItemsForRound(player, roundIndex) }));
    }

        .join("\n      - ");

    async function copyTextToClipboard(text) {
      if (!text) return false;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch {}

      const temp = document.createElement("textarea");
      temp.value = text;
      temp.style.position = "fixed";
      temp.style.opacity = "0";
      temp.style.pointerEvents = "none";
      document.body.appendChild(temp);
      temp.focus();
      temp.select();

      let ok = false;
      try { ok = document.execCommand("copy"); } catch { ok = false; }
      document.body.removeChild(temp);
      return ok;
    }

    function getPayload(data) { return Array.isArray(data) ? data[0] : data; }
    function getTeamsFromPayload(payload) { return Array.isArray(payload?.team_stats) ? payload.team_stats : []; }

    async function saveSharedState() {
      if (applyingRemoteState) return false;

      const payload = {
        room: SHARED_ROOM,
        json_text: CURRENT_SHARED_JSON_TEXT || "",
        details_mode: detailsMode === "all" ? "all" : "latest",
        updated_at: new Date().toISOString()
      };

      const { error } = await client
        .from("shared_match_state")
        .upsert(payload, { onConflict: "room" });

      if (error) {
        console.error("saveSharedState error:", error);
        setStatus("Shared state save failed:\n" + JSON.stringify(error, null, 2), true);
        return false;
      }
      return true;
    }

    async function loadSharedState() {
      const { data, error } = await client
        .from("shared_match_state")
        .select("room, json_text, details_mode")
        .eq("room", SHARED_ROOM)
        .maybeSingle();

      if (error) {
        console.error("loadSharedState error:", error);
        setStatus("Shared state load failed:\n" + JSON.stringify(error, null, 2), true);
        return;
      }

      $("jsonInput").value = getLocalInput();

      if (!data) {
        updateDetailsModeButtons();
        return;
      }

      applyingRemoteState = true;
      try {
        CURRENT_SHARED_JSON_TEXT = data.json_text || "";
        detailsMode = data.details_mode === "all" ? "all" : "latest";
        updateDetailsModeButtons();

        if (CURRENT_SHARED_JSON_TEXT.trim()) {
          await renderJson(false, CURRENT_SHARED_JSON_TEXT);
        } else {
          clearRender();
        }
      } finally {
        applyingRemoteState = false;
      }
    }

    function subscribeSharedState() {
      if (sharedChannel) return;

      sharedChannel = client
        .channel("shared-match-state")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "shared_match_state", filter: `room=eq.${SHARED_ROOM}` },
          async (payload) => {
            const row = payload?.new;
            if (!row) return;

            applyingRemoteState = true;
            try {
              CURRENT_SHARED_JSON_TEXT = row.json_text || "";
              detailsMode = row.details_mode === "all" ? "all" : "latest";
              updateDetailsModeButtons();

              if (CURRENT_SHARED_JSON_TEXT.trim()) {
                await renderJson(false, CURRENT_SHARED_JSON_TEXT);
              } else {
                clearRender();
              }
            } finally {
              applyingRemoteState = false;
            }
          }
        )
        .subscribe((status) => {
          if (status === "SUBSCRIBED") {
            if (!$("status").classList.contains("error")) {
              const current = $("status").textContent || "";
              if (!current.includes("Realtime")) {
                $("status").textContent = current + (current ? "\n" : "") + "Realtime: SUBSCRIBED";
              }
            }
          } else if (status === "CHANNEL_ERROR" || status === "TIMED_OUT" || status === "CLOSED") {
            setStatus("Realtime status: " + status, true);
          }
        });
    }

    async function renderJson(shouldBroadcast = true, rawOverride = null) {
      try {
        const sourceRaw = typeof rawOverride === "string" ? rawOverride : ($("jsonInput").value || "");
        if (typeof rawOverride !== "string") setLocalInput(sourceRaw);

        const raw = sourceRaw.trim();
        if (!raw) {
          clearRender();
          setStatus("Paste JSON first.", true);
          if (shouldBroadcast) { CURRENT_SHARED_JSON_TEXT = ""; await saveSharedState(); }
          return;
        }

        CURRENT_SHARED_JSON_TEXT = raw;

        await loadMatchApiLookups();
        if (!assetsLoaded) await loadAssetCatalogs();

        let data;
        try { data = JSON.parse(raw); }
        catch (err) {
          clearRender();
          setStatus(`Invalid JSON:\n${err.message}`, true);
          return;
        }

        const payload = getPayload(data);
        const teams = getTeamsFromPayload(payload);

        if (teams.length < 2) {
          clearRender();
          setStatus("This JSON needs at least 2 teams inside team_stats.", true);
          return;
        }

        CURRENT_PAYLOAD = payload;
        CURRENT_TEAMS = [teams[0], teams[1]];

        const teamAScore = computeTeamScore(CURRENT_TEAMS[0]);
        const teamBScore = computeTeamScore(CURRENT_TEAMS[1]);

        setTeamHeader("teamAName", CURRENT_TEAMS[0]?.team_name || "—", teamAScore, "left");
        setTeamHeader("teamBName", CURRENT_TEAMS[1]?.team_name || "—", teamBScore, "right");
        $("matchRound").textContent = getDisplayRound(payload, CURRENT_TEAMS);

        $("teamAContent").innerHTML = renderTeamContent(CURRENT_TEAMS[0]);
        $("teamBContent").innerHTML = renderTeamContent(CURRENT_TEAMS[1]);
        renderDetailsPanel();
        $("aiPromptOutput").value = buildAiAnalysisPrompt(payload, CURRENT_TEAMS);

        let message = `Rendered ${CURRENT_TEAMS[0]?.team_name || "Team A"} (${teamAScore}) vs ${CURRENT_TEAMS[1]?.team_name || "Team B"} (${teamBScore}).`;
        if (teams.length > 2) message += ` Found ${teams.length} teams total, so only the first 2 were shown.`;

        setStatus(message);
        setCopyPromptStatus("AI prompt generated. Use Copy Prompt to paste it into another AI tool.");

        if (shouldBroadcast) await saveSharedState();
      } catch (err) {
        setStatus(`Render failed:\n${err.message || err}`, true);
      }
    }

    $("jsonInput").addEventListener("input", () => setLocalInput($("jsonInput").value || ""));

    $("renderBtn").addEventListener("click", () => renderJson());

    $("reloadLookupBtn").addEventListener("click", async () => {
      matchApiLoaded = false;
      assetsLoaded = false;
      try {
        await warmUp();
        if (CURRENT_TEAMS && CURRENT_TEAMS.length >= 2) {
          const teamAScore = computeTeamScore(CURRENT_TEAMS[0]);
          const teamBScore = computeTeamScore(CURRENT_TEAMS[1]);
          setTeamHeader("teamAName", CURRENT_TEAMS[0]?.team_name || "—", teamAScore, "left");
          setTeamHeader("teamBName", CURRENT_TEAMS[1]?.team_name || "—", teamBScore, "right");
          renderDetailsPanel();
        }
      } catch (err) {
        setStatus(`Reload failed:\n${err.message || err}`, true);
      }
    });

    $("clearBtn").addEventListener("click", async () => {
      $("jsonInput").value = "";
      clearLocalInput();
      clearRender();
      setStatus("Cleared. Paste new JSON to render.");
      CURRENT_SHARED_JSON_TEXT = "";
      await saveSharedState();
    });

    $("copyPromptBtn").addEventListener("click", async () => {
      const text = $("aiPromptOutput").value.trim();
      if (!text) { setCopyPromptStatus("No prompt to copy yet. Render match JSON first."); return; }
      const ok = await copyTextToClipboard(text);
      setCopyPromptStatus(ok ? "AI prompt copied to clipboard." : "Copy failed. You can still manually select and copy the prompt.");
    });

    $("latestModeBtn").addEventListener("click", () => setDetailsMode("latest"));
    $("allRoundsModeBtn").addEventListener("click", () => setDetailsMode("all"));

    updateDetailsModeButtons();

    (async () => {
      $("jsonInput").value = getLocalInput();
      await warmUp();
      await loadSharedState();
      subscribeSharedState();
    })();
  </script>
</body>
</html>
