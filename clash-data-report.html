<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clash Squad Report</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#06101f;
      --bg2:#08182b;
      --panel:rgba(8,18,38,.92);
      --panel2:rgba(10,24,48,.96);
      --line:rgba(124,172,255,.14);
      --line2:rgba(124,172,255,.08);
      --ink:#eef4ff;
      --muted:#9fb0d1;
      --cyan:#2dafff;
      --orange:#ff7f32;
      --good:#7cff9e;
      --bad:#ff8f8f;
      --gold:#ffbd59;
      --shadow:0 24px 60px rgba(0,0,0,.45);
      --radius:22px;
      --radius-sm:14px;
    }

    *{box-sizing:border-box}
    html,body{margin:0}
    body{
      font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 0% 10%, rgba(0,180,255,.12), transparent 20%),
        radial-gradient(circle at 100% 10%, rgba(255,90,0,.10), transparent 20%),
        linear-gradient(180deg,#030814 0%,#071122 100%);
    }

    .app{
      max-width:1480px;
      margin:0 auto;
      padding:18px;
    }

    .hero{
      margin-bottom:16px;
      padding:18px 20px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:
        linear-gradient(180deg, rgba(10,20,42,.94), rgba(7,14,30,.96));
      box-shadow:var(--shadow);
    }

    .title{
      margin:0 0 6px;
      font-size:28px;
      font-weight:900;
      letter-spacing:.02em;
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
    }

    .panel{
      background:linear-gradient(180deg, rgba(10,20,42,.94), rgba(7,14,30,.96));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      min-width:0;
    }

    .panel + .panel{ margin-top:16px; }

    .panel-inner{ padding:16px; }

    .section-title{
      margin:0 0 12px;
      font-size:15px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#d9e8ff;
    }

    .controls{
      display:grid;
      grid-template-columns:repeat(6, minmax(0,1fr));
      gap:10px;
      align-items:end;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }

    .field label{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:var(--muted);
      font-weight:800;
    }

    .select-ui,
    .input-ui{
      width:100%;
      min-height:40px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#08111f;
      color:var(--ink);
      padding:10px 12px;
      outline:none;
      font:600 12px/1.2 Inter,Segoe UI,Roboto,Arial,sans-serif;
    }

    .select-ui:focus,
    .input-ui:focus{
      border-color:rgba(45,175,255,.45);
      box-shadow:0 0 0 3px rgba(45,175,255,.10);
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    button{
      border:0;
      border-radius:12px;
      padding:10px 16px;
      font-weight:800;
      cursor:pointer;
      background:linear-gradient(90deg, var(--cyan), #68ffd7);
      color:#08101d;
      font-size:12px;
      line-height:1;
      white-space:nowrap;
    }

    button.ghost{
      background:transparent;
      color:var(--ink);
      border:1px solid var(--line);
    }

    button:disabled{
      opacity:.5;
      cursor:not-allowed;
    }

    .status{
      margin-top:12px;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:13px;
      white-space:pre-wrap;
    }

    .status.error{
      color:#ffd7d7;
      border-color:rgba(255,123,123,.35);
      background:rgba(255,123,123,.08);
    }

    .tabs{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .tab-btn{
      padding:9px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
      color:#d9e6ff;
      font-size:12px;
      font-weight:900;
      cursor:pointer;
    }

    .tab-btn.active{
      background:linear-gradient(90deg, rgba(45,175,255,.24), rgba(104,255,215,.20));
      color:#fff;
      border-color:rgba(45,175,255,.45);
    }

    .tab-section{ display:none; }
    .tab-section.active{ display:block; }

    .kpi-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:12px;
    }

    .kpi-card{
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(255,255,255,.025);
      padding:14px;
      min-width:0;
    }

    .kpi-label{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted);
      font-weight:800;
      margin-bottom:8px;
    }

    .kpi-value{
      font-size:28px;
      line-height:1;
      font-weight:900;
      color:#fff;
    }

    .kpi-sub{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
    }

    .split-2{
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(0,1fr);
      gap:16px;
    }

    .card-list{
      display:grid;
      gap:10px;
    }

    .mini-card{
      border:1px solid var(--line2);
      border-radius:16px;
      background:rgba(255,255,255,.025);
      padding:12px;
      min-width:0;
    }

    .mini-title{
      font-size:13px;
      font-weight:900;
      color:#fff;
      margin:0 0 6px;
      line-height:1.25;
    }

    .mini-copy{
      font-size:12px;
      color:#d4e2ff;
      line-height:1.4;
      word-break:break-word;
    }

    .chips{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      min-height:26px;
      padding:0 10px;
      border-radius:999px;
      border:1px solid rgba(124,172,255,.14);
      background:rgba(255,255,255,.04);
      color:#eef4ff;
      font-size:11px;
      font-weight:800;
      line-height:1;
      white-space:nowrap;
    }

    .chip.good{
      color:#06210d;
      background:linear-gradient(90deg, rgba(124,255,158,.95), rgba(104,255,215,.95));
      border-color:rgba(124,255,158,.7);
    }

    .chip.bad{
      color:#2a0909;
      background:linear-gradient(90deg, rgba(255,143,143,.95), rgba(255,190,190,.95));
      border-color:rgba(255,143,143,.7);
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:rgba(255,255,255,.02);
    }

    table{
      width:100%;
      min-width:980px;
      border-collapse:collapse;
    }

    th, td{
      padding:10px 10px;
      border-bottom:1px solid rgba(124,172,255,.08);
      vertical-align:top;
      text-align:left;
      font-size:12px;
      line-height:1.35;
    }

    th{
      position:sticky;
      top:0;
      background:#0b1628;
      color:#eef4ff;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.05em;
      font-size:11px;
      z-index:1;
    }

    tr:hover td{
      background:rgba(255,255,255,.02);
    }

    .mono{
      font-variant-numeric:tabular-nums;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    }

    .muted{ color:var(--muted); }
    .good{ color:var(--good); }
    .bad{ color:var(--bad); }
    .gold{ color:var(--gold); }

    .match-card{
      border:1px solid var(--line2);
      border-radius:18px;
      background:rgba(255,255,255,.02);
      padding:14px;
      display:grid;
      gap:10px;
    }

    .match-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    .match-title{
      font-size:15px;
      font-weight:900;
      color:#fff;
      line-height:1.2;
    }

    .match-meta{
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
    }

    .match-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:10px;
    }

    .subbox{
      border:1px solid var(--line2);
      border-radius:14px;
      background:rgba(255,255,255,.02);
      padding:10px;
      min-width:0;
    }

    .subbox-title{
      margin:0 0 8px;
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#8fe6ff;
      font-weight:900;
    }

    .line-list{
      display:grid;
      gap:5px;
      font-size:12px;
      color:#d6e3ff;
      line-height:1.35;
    }

    .pill-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:12px;
    }

    .hint{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      line-height:1.4;
    }

    @media (max-width: 1200px){
      .controls{ grid-template-columns:repeat(3, minmax(0,1fr)); }
      .kpi-grid{ grid-template-columns:repeat(2, minmax(0,1fr)); }
      .split-2{ grid-template-columns:1fr; }
    }

    @media (max-width: 760px){
      .app{ padding:12px; }
      .controls{ grid-template-columns:1fr; }
      .kpi-grid{ grid-template-columns:1fr; }
      .match-grid{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <h1 class="title">Clash Squad Matched Report</h1>
      <p class="sub">
        This page first matches <strong>cs_report_matches</strong> to <strong>draft_records</strong> using
        <strong>teams + exact score/result + active skill comp</strong>. After a row is matched, the page uses
        <strong>draft_records</strong> as the source for tournament, map, bans, and player names.
      </p>
    </section>

    <section class="panel">
      <div class="panel-inner">
        <h2 class="section-title">Controls</h2>

        <div class="controls">
          <div class="field">
            <label for="teamFilter">Team</label>
            <select id="teamFilter" class="select-ui">
              <option value="__ALL__">All teams</option>
            </select>
          </div>

          <div class="field">
            <label for="mapFilter">Map</label>
            <select id="mapFilter" class="select-ui">
              <option value="__ALL__">All maps</option>
            </select>
          </div>

          <div class="field">
            <label for="playerFilter">Player</label>
            <select id="playerFilter" class="select-ui">
              <option value="__ALL__">All players</option>
            </select>
          </div>

          <div class="field">
            <label for="matchFilter">Direct match lookup</label>
            <select id="matchFilter" class="select-ui">
              <option value="__ALL__">All matched records</option>
            </select>
          </div>

          <div class="field">
            <label for="minScoreFilter">Min match score</label>
            <select id="minScoreFilter" class="select-ui">
              <option value="0">0+</option>
              <option value="70">70+</option>
              <option value="80">80+</option>
              <option value="90" selected>90+</option>
              <option value="100">100+</option>
            </select>
          </div>

          <div class="field">
            <label>Actions</label>
            <div class="actions">
              <button id="reloadBtn" type="button">Reload Report</button>
              <button id="resetBtn" class="ghost" type="button">Reset Filters</button>
            </div>
          </div>
        </div>

        <div id="status" class="status">Ready to load report data.</div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-inner">
        <div class="tabs">
          <button class="tab-btn active" data-tab="summary" type="button">Summary</button>
          <button class="tab-btn" data-tab="teams" type="button">By Team</button>
          <button class="tab-btn" data-tab="players" type="button">By Player</button>
          <button class="tab-btn" data-tab="maps" type="button">By Map</button>
          <button class="tab-btn" data-tab="matches" type="button">Matched Matches</button>
        </div>

        <div id="tab-summary" class="tab-section active"></div>
        <div id="tab-teams" class="tab-section"></div>
        <div id="tab-players" class="tab-section"></div>
        <div id="tab-maps" class="tab-section"></div>
        <div id="tab-matches" class="tab-section"></div>
      </div>
    </section>
  </div>

  <script>
    const client = supabase.createClient(
      'https://ooutjrewmwsixghbouxi.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vdXRqcmV3bXdzaXhnaGJvdXhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwMjg3NTMsImV4cCI6MjA4MjYwNDc1M30.13WkdGiQH39lZH3iDgVDd_tZrHlI0twhGeiZNdwaMSg'
    );

    const TEAM_ALIAS = {
      AG: 'AG',
      BURIRAM: 'BRU',
      BRU: 'BRU',
      'EVOS DIVINE': 'EVOS',
      EVOS: 'EVOS',
      FALCONS: 'FLCN',
      FLCN: 'FLCN',
      HEAVY: 'HEV',
      HEV: 'HEV',
      WAG: 'WAG',
      'RRQ KAZU': 'RRQ',
      RRQ: 'RRQ',
      'P ESPORTS': 'PE',
      PE: 'PE'
    };

    const REPORT_SELECT = `
      *,
      created_at,
      match_date,
      report_match_key,
      source_match_key
    `;

    const DRAFT_SELECT = `
      id,
      created_at,
      match_date,
      game_number,
      team_left,
      team_right,
      team_left_score,
      team_right_score,
      map,
      tournament_name,
      state
    `;

    const STATE = {
      reportRows: [],
      draftRows: [],
      allMatches: [],
      filteredMatches: [],
      currentTab: 'summary'
    };

    const $ = (id) => document.getElementById(id);

    function setStatus(message, isError = false){
      const el = $('status');
      if (!el) return;
      el.textContent = message;
      el.className = isError ? 'status error' : 'status';
    }

    function normalizeText(v){
      return String(v || '')
        .toUpperCase()
        .trim()
        .replace(/[_-]+/g, ' ')
        .replace(/\s+/g, ' ');
    }

    function normalizeTeam(v){
      const raw = normalizeText(v);
      return TEAM_ALIAS[raw] || raw;
    }

    function firstWord(v){
      return String(v || '').trim().split(/\s+/)[0] || '';
    }

    function normalizeSkillWord(v){
      return normalizeText(firstWord(v));
    }

    function parseJson(v, fallback = null){
      if (v == null) return fallback;
      if (typeof v === 'object') return v;
      try { return JSON.parse(v); } catch { return fallback; }
    }

    function firstNonEmpty(...vals){
      for (const v of vals){
        if (v !== null && v !== undefined && String(v).trim() !== '') return v;
      }
      return '';
    }

    function toNum(v, fallback = 0){
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }

    function uniq(arr){
      return [...new Set(arr)];
    }

    function normalizeSkillArray(arr){
      if (!arr) return [];
      if (typeof arr === 'string'){
        const parsed = parseJson(arr, null);
        if (Array.isArray(parsed)) arr = parsed;
        else arr = arr.split(/[|,]/).map(x => x.trim()).filter(Boolean);
      }
      if (!Array.isArray(arr)) return [];
      return arr.map(item => {
        if (typeof item === 'string') return normalizeSkillWord(item);
        if (item && typeof item === 'object') {
          return normalizeSkillWord(firstNonEmpty(item.name, item.skill_name, item.label));
        }
        return '';
      }).filter(Boolean);
    }

    function signature(arr){
      return normalizeSkillArray(arr).sort().join('|');
    }

    function signatureOverlap(sigA, sigB){
      const a = sigA ? sigA.split('|').filter(Boolean) : [];
      const b = new Set(sigB ? sigB.split('|').filter(Boolean) : []);
      let count = 0;
      for (const x of a) if (b.has(x)) count++;
      return count;
    }

    function fmtPct(n, d){
      if (!d) return '—';
      return ((n / d) * 100).toFixed(1) + '%';
    }

    function safe(v, fallback='—'){
      const s = String(v ?? '').trim();
      return s || fallback;
    }

    function escapeHtml(value){
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    async function fetchAllRows(table, selectString){
      const limit = 1000;
      let from = 0;
      let done = false;
      let all = [];

      while (!done) {
        const { data, error } = await client
          .from(table)
          .select(selectString)
          .range(from, from + limit - 1);

        if (error) throw error;

        const rows = data || [];
        all = all.concat(rows);

        if (rows.length < limit) done = true;
        from += limit;
      }

      return all;
    }

    function extractReportMatch(row){
      const teamA = normalizeTeam(firstNonEmpty(
        row.team_a_name,
        row.team_left,
        row.left_team_name,
        row.team1_name,
        row.team_a,
        row.left_team,
        row.side_a_team
      ));

      const teamB = normalizeTeam(firstNonEmpty(
        row.team_b_name,
        row.team_right,
        row.right_team_name,
        row.team2_name,
        row.team_b,
        row.right_team,
        row.side_b_team
      ));

      const scoreA = toNum(firstNonEmpty(
        row.team_a_score,
        row.team_left_score,
        row.left_score,
        row.score_a,
        row.score_left
      ), 0);

      const scoreB = toNum(firstNonEmpty(
        row.team_b_score,
        row.team_right_score,
        row.right_score,
        row.score_b,
        row.score_right
      ), 0);

      const activeA = signature(firstNonEmpty(
        row.active_comp_team_a,
        row.team_a_active_comp,
        row.active_team_a,
        row.team_a_actives,
        row.left_active_comp,
        row.team_a_skills,
        row.team_a_active_skills
      ));

      const activeB = signature(firstNonEmpty(
        row.active_comp_team_b,
        row.team_b_active_comp,
        row.active_team_b,
        row.team_b_actives,
        row.right_active_comp,
        row.team_b_skills,
        row.team_b_active_skills
      ));

      return {
        ...row,
        _teamA: teamA,
        _teamB: teamB,
        _scoreA: scoreA,
        _scoreB: scoreB,
        _activeASig: activeA,
        _activeBSig: activeB
      };
    }

    function extractDraftRecord(row){
      const state = parseJson(row.state, {});
      const picks = Array.isArray(state?.picks) ? state.picks : [];
      const bans = Array.isArray(state?.bans) ? state.bans : [];
      const playerCards = Array.isArray(state?.playerCards) ? state.playerCards : [];
      const passives = Array.isArray(state?.passives) ? state.passives : [];

      const teamLeft = normalizeTeam(firstNonEmpty(row.team_left, row.team_a_name, row.left_team_name));
      const teamRight = normalizeTeam(firstNonEmpty(row.team_right, row.team_b_name, row.right_team_name));

      const scoreLeft = toNum(firstNonEmpty(row.team_left_score, row.team_a_score, row.left_score), 0);
      const scoreRight = toNum(firstNonEmpty(row.team_right_score, row.team_b_score, row.right_score), 0);

      const leftActives = picks.slice(0, 4).map(x => x?.name || '');
      const rightActives = picks.slice(4, 8).map(x => x?.name || '');

      return {
        ...row,
        _state: state,
        _teamLeft: teamLeft,
        _teamRight: teamRight,
        _scoreLeft: scoreLeft,
        _scoreRight: scoreRight,
        _leftActiveSig: signature(leftActives),
        _rightActiveSig: signature(rightActives),
        _map: firstNonEmpty(row.map, row.match_map, row.map_name, '—'),
        _tournament: firstNonEmpty(row.tournament_name, row.tournament, '—'),
        _leftBan: bans[0]?.name || '',
        _rightBan: bans[1]?.name || '',
        _playerCards: playerCards,
        _passives: passives
      };
    }

    function scoreMatch(reportMatch, draftMatch){
      let score = 0;
      let reversed = false;
      const reasons = [];

      const normalTeams =
        reportMatch._teamA === draftMatch._teamLeft &&
        reportMatch._teamB === draftMatch._teamRight;

      const reverseTeams =
        reportMatch._teamA === draftMatch._teamRight &&
        reportMatch._teamB === draftMatch._teamLeft;

      if (!normalTeams && !reverseTeams) {
        return { score: -1, reversed: false, reasons: ['team mismatch'], aOverlap: 0, bOverlap: 0 };
      }

      reversed = reverseTeams;
      score += 70;
      reasons.push(reversed ? 'team pair reversed' : 'team pair');

      const exactScore =
        (!reversed &&
          reportMatch._scoreA === draftMatch._scoreLeft &&
          reportMatch._scoreB === draftMatch._scoreRight) ||
        (reversed &&
          reportMatch._scoreA === draftMatch._scoreRight &&
          reportMatch._scoreB === draftMatch._scoreLeft);

      if (exactScore) {
        score += 50;
        reasons.push('score exact');
      } else {
        return { score: -1, reversed, reasons: ['score mismatch'], aOverlap: 0, bOverlap: 0 };
      }

      const expectedLeftSig = reversed ? draftMatch._rightActiveSig : draftMatch._leftActiveSig;
      const expectedRightSig = reversed ? draftMatch._leftActiveSig : draftMatch._rightActiveSig;

      const aOverlap = signatureOverlap(reportMatch._activeASig, expectedLeftSig);
      const bOverlap = signatureOverlap(reportMatch._activeBSig, expectedRightSig);

      score += (aOverlap * 6);
      score += (bOverlap * 6);

      reasons.push(`A active ${aOverlap}/4`);
      reasons.push(`B active ${bOverlap}/4`);

      return { score, reversed, reasons, aOverlap, bOverlap };
    }

    function attachBestDraftMatches(reportMatches, draftMatches){
      const usedDraftIds = new Set();

      return reportMatches.map(reportMatch => {
        let best = null;

        for (const draftMatch of draftMatches){
          if (usedDraftIds.has(draftMatch.id)) continue;

          const result = scoreMatch(reportMatch, draftMatch);
          if (result.score < 0) continue;

          if (!best || result.score > best.score){
            best = { ...result, draft: draftMatch };
          }
        }

        if (best && best.score >= 90){
          usedDraftIds.add(best.draft.id);

          const leftTeam = best.reversed ? best.draft._teamRight : best.draft._teamLeft;
          const rightTeam = best.reversed ? best.draft._teamLeft : best.draft._teamRight;
          const leftScore = best.reversed ? best.draft._scoreRight : best.draft._scoreLeft;
          const rightScore = best.reversed ? best.draft._scoreLeft : best.draft._scoreRight;
          const leftBan = best.reversed ? best.draft._rightBan : best.draft._leftBan;
          const rightBan = best.reversed ? best.draft._leftBan : best.draft._rightBan;
          const players = best.draft._playerCards || [];
          const leftPlayers = best.reversed ? players.slice(4,8) : players.slice(0,4);
          const rightPlayers = best.reversed ? players.slice(0,4) : players.slice(4,8);

          return {
            ...reportMatch,
            _matched: true,
            _matchScore: best.score,
            _matchReasons: best.reasons,
            _matchReversed: best.reversed,
            _draft: best.draft,
            _map: best.draft._map,
            _tournament: best.draft._tournament,
            _leftTeam: leftTeam,
            _rightTeam: rightTeam,
            _leftScore: leftScore,
            _rightScore: rightScore,
            _leftBan: leftBan,
            _rightBan: rightBan,
            _leftPlayers: leftPlayers,
            _rightPlayers: rightPlayers,
            _playerCards: players,
            _passives: best.draft._passives
          };
        }

        return {
          ...reportMatch,
          _matched: false,
          _matchScore: 0,
          _matchReasons: [],
          _matchReversed: false,
          _draft: null,
          _map: '—',
          _tournament: '—',
          _leftTeam: reportMatch._teamA,
          _rightTeam: reportMatch._teamB,
          _leftScore: reportMatch._scoreA,
          _rightScore: reportMatch._scoreB,
          _leftBan: '',
          _rightBan: '',
          _leftPlayers: [],
          _rightPlayers: [],
          _playerCards: [],
          _passives: []
        };
      });
    }

      matchSel.innerHTML = `<option value="__ALL__">All matched records</option>` +
        matches.map((row, idx) => {
          const value = String(row._draft?.id || row.id || idx);
          return `<option value="${escapeHtml(value)}">${escapeHtml(buildMatchLabel(row))}</option>`;
        }).join('');

      if ([...teamSel.options].some(o => o.value === currentTeam)) teamSel.value = currentTeam;
      if ([...mapSel.options].some(o => o.value === currentMap)) mapSel.value = currentMap;
      if ([...playerSel.options].some(o => o.value === currentPlayer)) playerSel.value = currentPlayer;
      if ([...matchSel.options].some(o => o.value === currentMatch)) matchSel.value = currentMatch;
    }

    function applyFilters(){
      const team = $('teamFilter').value || '__ALL__';
      const map = $('mapFilter').value || '__ALL__';
      const player = $('playerFilter').value || '__ALL__';
      const directMatch = $('matchFilter').value || '__ALL__';
      const minScore = toNum($('minScoreFilter').value, 0);

      let rows = STATE.allMatches.filter(r => r._matched);

      rows = rows.filter(r => r._matchScore >= minScore);

      if (team !== '__ALL__'){
        rows = rows.filter(r => r._leftTeam === team || r._rightTeam === team);
      }

      if (map !== '__ALL__'){
        rows = rows.filter(r => safe(r._map) === map);
      }

      if (player !== '__ALL__'){
        rows = rows.filter(r => (r._playerCards || []).includes(player));
      }

      if (directMatch !== '__ALL__'){
        rows = rows.filter((r, idx) => String(r._draft?.id || r.id || idx) === directMatch);
      }

      STATE.filteredMatches = rows;
      renderActiveTab();
    }

    function summarizeByCount(items, topN = 10){
      const map = new Map();
      for (const item of items.filter(Boolean)){
        map.set(item, (map.get(item) || 0) + 1);
      }
      return [...map.entries()]
        .sort((a,b) => b[1] - a[1] || String(a[0]).localeCompare(String(b[0])))
        .slice(0, topN);
    }

    function summarizeActiveComp(row, side='left'){
      return side === 'left' ? row._activeASig : row._activeBSig;

      const total = rows.length;
      const leftWins = rows.filter(r => r._leftScore > r._rightScore).length;
      const rightWins = rows.filter(r => r._rightScore > r._leftScore).length;

      const allMaps = summarizeByCount(rows.map(r => r._map), 8);
      const allTournaments = summarizeByCount(rows.map(r => r._tournament), 8);
      const allPlayers = summarizeByCount(rows.flatMap(r => r._playerCards || []), 12);
      const allBans = summarizeByCount(rows.flatMap(r => [r._leftBan, r._rightBan]), 12);
      const allActive = summarizeByCount(rows.flatMap(r => [r._activeASig, r._activeBSig]).filter(Boolean), 12);

      return { total, leftWins, rightWins, allMaps, allTournaments, allPlayers, allBans, allActive };

    function computeTeamAggregates(rows){
      const teams = new Map();

      for (const row of rows){
        const sides = [
          {
            team: row._leftTeam,
            opp: row._rightTeam,
            score: row._leftScore,
            oppScore: row._rightScore,
            ban: row._leftBan,
            players: row._leftPlayers || [],
            activeSig: row._activeASig,
            map: row._map,
            tournament: row._tournament
          },
          {
            team: row._rightTeam,
            opp: row._leftTeam,
            score: row._rightScore,
            oppScore: row._leftScore,
            ban: row._rightBan,
            players: row._rightPlayers || [],
            activeSig: row._activeBSig,
            map: row._map,
            tournament: row._tournament
          }
        ];

        for (const side of sides){
          if (!side.team) continue;

          if (!teams.has(side.team)){
            teams.set(side.team, {
              team: side.team,
              matches: 0,
              wins: 0,
              maps: [],
              tournaments: [],
              bans: [],
              players: [],
              actives: [],
              opponents: []
            });
          }

          const t = teams.get(side.team);
          t.matches += 1;
          if (side.score > side.oppScore) t.wins += 1;
          t.maps.push(side.map);
          t.tournaments.push(side.tournament);
          if (side.ban) t.bans.push(side.ban);
          t.players.push(...side.players.filter(Boolean));
          if (side.activeSig) t.actives.push(side.activeSig);
          if (side.opp) t.opponents.push(side.opp);
        }
      }

      return [...teams.values()]
        .map(t => ({
          ...t,
          mapTop: summarizeByCount(t.maps, 5),
          tournTop: summarizeByCount(t.tournaments, 5),
          banTop: summarizeByCount(t.bans, 5),
          playerTop: summarizeByCount(t.players, 8),
          activeTop: summarizeByCount(t.actives, 5),
          oppTop: summarizeByCount(t.opponents, 5)
        }))
        .sort((a,b) => b.matches - a.matches || a.team.localeCompare(b.team));
    }

          if (row._leftBan) p.bans.push(row._leftBan);

    async function loadData(){
      try{
        setStatus('Loading cs_report_matches and draft_records...');

        const [reportRows, draftRows] = await Promise.all([
          fetchAllRows('cs_report_matches', REPORT_SELECT),
          fetchAllRows('draft_records', DRAFT_SELECT)
        ]);

        STATE.reportRows = reportRows;
        STATE.draftRows = draftRows;

        const reportPrepared = reportRows.map(extractReportMatch);

        const ffcmDrafts = draftRows
          .map(extractDraftRecord)
          .filter(row => normalizeText(row._tournament).includes('FFCM'));

        STATE.allMatches = attachBestDraftMatches(reportPrepared, ffcmDrafts);

        console.log('reportPrepared', reportPrepared.length);
        console.log('ffcmDrafts', ffcmDrafts.length);
        console.log('matched', STATE.allMatches.filter(x => x._matched).length);
        console.log('unmatched', STATE.allMatches.filter(x => !x._matched).length);
        console.log('sample unmatched', STATE.allMatches.filter(x => !x._matched).slice(0, 5));

        populateFilters();
        applyFilters();

        setStatus(
          `Loaded.\n` +
          `cs_report_matches: ${reportRows.length}\n` +
          `draft_records (FFCM only): ${ffcmDrafts.length}\n` +
          `matched rows: ${STATE.allMatches.filter(x => x._matched).length}\n` +
          `unmatched rows: ${STATE.allMatches.filter(x => !x._matched).length}`
        );
      } catch(err){
        console.error(err);
        setStatus(`Load failed:\n${err.message || err}`, true);
      }
    }

    function resetFilters(){
      $('teamFilter').value = '__ALL__';
      $('mapFilter').value = '__ALL__';
      $('playerFilter').value = '__ALL__';
      $('matchFilter').value = '__ALL__';
      $('minScoreFilter').value = '90';
      applyFilters();
    }

    function initTabs(){
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const tab = btn.dataset.tab;
          STATE.currentTab = tab;

          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          document.querySelectorAll('.tab-section').forEach(sec => sec.classList.remove('active'));
          $('tab-' + tab).classList.add('active');
        });
      });
    }

    $('reloadBtn').addEventListener('click', loadData);
    $('resetBtn').addEventListener('click', resetFilters);
    $('teamFilter').addEventListener('change', applyFilters);
    $('mapFilter').addEventListener('change', applyFilters);
    $('playerFilter').addEventListener('change', applyFilters);
    $('matchFilter').addEventListener('change', applyFilters);
    $('minScoreFilter').addEventListener('change', applyFilters);

    initTabs();
    loadData();
  </script>
</body>
</html>
